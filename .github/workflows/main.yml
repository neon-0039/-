name: Misskey Bot JS Cron
concurrency:
  group: bot-group
  cancel-in-progress: true

on:
  repository_dispatch:
    types: [a_bot]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run bot
        run: |
          node on.js
